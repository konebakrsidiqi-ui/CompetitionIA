name: Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf automake libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev

      - name: Installer Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Accepter les licences Android
        run: yes | buildozer android accept_sdk_license

      - name: Construire l'APK
        run: buildozer android debug

      - name: Envoyer l'APK
        uses: actions/upload-artifact@v4
        with:
          name: CompetitionIA-APK
          path: bin/*.apk
